name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - claude/super-app-tracker-finances-notes-nudq3a
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          # Firebase web config — public values, safe to keep here.
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyD9Vg0WsM_5EJtESaRVKZY1H5YcfGs3WkA
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: my-dream-a.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: my-dream-a
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: my-dream-a.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "236145636929"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:236145636929:web:3081885cd728006b5038c0"
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_DREAM_A }}
          projectId: my-dream-a
          channelId: live
