name: Deploy to GitHub Pages

# main هو المصدر الوحيد للنشر — الفروع الأخرى للتطوير فقط.
# (سبب هذا القيد: تعدد فروع النشر سبق أن جعل نشراً من فرع قديم
# يستبدل النسخة الكاملة الحية.)
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate — a red check blocks the deploy (main is the only publish
      # source, so nothing broken reaches the live site). Order is cheapest-first
      # so an obvious failure fails fast before the slower build.
      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Worker typecheck
        working-directory: cloudflare-worker
        run: |
          npm ci
          npm run typecheck

      - name: Build static site (with base path for project pages)
        env:
          BASE_PATH: /My-dream
          # Cloud sync activates automatically once these repo secrets are
          # set (Settings → Secrets and variables → Actions). Empty secrets
          # keep Firebase disabled and the app fully on-device.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # Public Worker URL (Repository variable, not a secret), e.g.
          # https://madar-r2-gateway.<subdomain>.workers.dev
          NEXT_PUBLIC_R2_WORKER_URL: ${{ vars.NEXT_PUBLIC_R2_WORKER_URL }}
        run: npm run build

      - name: Disable Jekyll (needed for Next.js _next folder)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
